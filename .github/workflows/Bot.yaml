          # REPORT GENERATION
          # ============================================================
          def generate_report(target_url, findings):
              report = f"📊 **Comprehensive Scan Report**\n"
              report += f"Target: `{target_url}`\n"
              report += f"Vulnerabilities Found: {len(findings['vulnerable'])}\n\n"

              if findings['vulnerable']:
                  report += "🔴 **Vulnerabilities Detected:**\n"
                  for idx, vuln in enumerate(findings['vulnerable'], 1):
                      report += f"**{idx}. {vuln['name']}** (Severity: `{vuln['severity']}`)\n"
                      report += f"   - URL: {vuln['url']}\n"
                      if vuln.get('parameter'):
                          report += f"   - Parameter: `{vuln['parameter']}`\n"
                      if vuln.get('payload'):
                          report += f"   - Payload: `{vuln['payload']}`\n"
                      report += f"   - Description: {vuln['description']}\n"
                      report += f"   - Remediation: {vuln['remediation']}\n"
                      report += f"   - Proof: {vuln['proof']}\n\n"
              else:
                  report += "✅ No vulnerabilities found.\n\n"

              if findings['passed']:
                  report += "🟢 **Security Checks Passed:**\n"
                  for item in findings['passed']:
                      report += f"   - {item['check']}: {item['details']}\n"
              else:
                  report += "ℹ️ No additional security checks passed.\n"

              # AI Exploitation Guide
              critical = [v for v in findings['vulnerable'] if v['severity'] in ['Critical', 'High']]
              if critical:
                  report += "\n🤖 **AI Exploitation Guide:**\n"
                  try:
                      prompt = f"Generate step-by-step exploitation instructions for these vulnerabilities: {json.dumps(critical, indent=2)}"
                      response = model.generate_content(prompt)
                      report += response.text
                  except Exception as e:
                      report += "⚠️ AI generation failed, but manual exploitation is described above.\n"

              return report

          # ============================================================
          # SCAN COMMAND
          # ============================================================
          async def scan_command(update: Update, context: ContextTypes.DEFAULT_TYPE):
              user_id = str(update.effective_user.id)
              if ALLOWED_CHAT_ID and user_id != ALLOWED_CHAT_ID:
                  await update.message.reply_text("⛔ Unauthorized.")
                  return

              if not context.args:
                  await update.message.reply_text("❌ Provide a URL: /scan https://example.com")
                  return

              target_url = context.args[0]
              if not target_url.startswith(('http://', 'https://')):
                  target_url = 'https://' + target_url

              await update.message.reply_text(f"🔍 Comprehensive scan of `{target_url}`...")

              try:
                  crawler = WebCrawler(target_url, max_pages=50)
                  crawl_data = crawler.crawl()
                  scanner = ComprehensiveScanner(target_url, crawl_data)
                  findings = scanner.scan_all()
                  report = generate_report(target_url, findings)

                  if len(report) > 4096:
                      for i in range(0, len(report), 4000):
                          await update.message.reply_text(report[i:i+4000], parse_mode='Markdown')
                  else:
                      await update.message.reply_text(report, parse_mode='Markdown')

              except Exception as e:
                  logger.error(f"❌ Scan error: {traceback.format_exc()}")
                  await update.message.reply_text(f"❌ Error: {str(e)[:200]}")

          # ============================================================
          # MAIN – Manual event loop
          # ============================================================
          async def run_bot():
              app = Application.builder().token(TELEGRAM_TOKEN).build()
              app.add_handler(CommandHandler("help", help_command))
              app.add_handler(CommandHandler("scan", scan_command))
              await app.initialize()
              await app.start()
              await app.updater.start_polling()
              logger.info("✅ Bot running. Press Ctrl+C to stop.")
              try:
                  while True:
                      await asyncio.sleep(3600)
              except asyncio.CancelledError:
                  pass
              finally:
                  await app.updater.stop()
                  await app.stop()

          def main():
              logger.info("🦅 Starting Vulnerability Scanner Bot...")
              loop = asyncio.new_event_loop()
              asyncio.set_event_loop(loop)
              try:
                  loop.run_until_complete(run_bot())
              except KeyboardInterrupt:
                  logger.info("👋 Stopped.")
              except Exception as e:
                  logger.error(f"❌ Fatal error: {traceback.format_exc()}")
              finally:
                  loop.close()

          if __name__ == "__main__":
              main()
          EOF

          # ----------------------------
          # 2. requirements.txt
          # ----------------------------
          cat > requirements.txt << 'EOF'
          python-telegram-bot==21.10
          requests
          beautifulsoup4
          google-generativeai
          urllib3
          python-nmap
          EOF

          # ----------------------------
          # 3. render.yaml
          # ----------------------------
          cat > render.yaml << 'EOF'
          services:
            - type: web
              name: vuln-scanner
              env: python
              plan: free
              buildCommand: pip install -r requirements.txt
              startCommand: python bot.py
          EOF

          echo "✅ Comprehensive bot files created."

      - name: Commit and push bot files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot.py requirements.txt render.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-generate comprehensive scanner [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi

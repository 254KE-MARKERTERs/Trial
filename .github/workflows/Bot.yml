- name: Deploy to Render
  env:
    RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    REPO_NAME: ${{ github.event.repository.name }}
    GITHUB_REPO: ${{ github.repository }}
  run: |
    PAYLOAD=$(cat <<EOF
    {
      "name": "vuln-scanner-${REPO_NAME}",
      "env": "python",
      "plan": "free",
      "repo": "https://github.com/${GITHUB_REPO}",
      "buildCommand": "pip install -r requirements.txt",
      "startCommand": "python bot.py",
      "autoDeploy": "yes"
    }
    EOF
    )

    echo "Payload: $PAYLOAD"

    # Capture HTTP status and response body
    RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.render.com/v1/services" \
      -H "Authorization: Bearer ${RENDER_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "$PAYLOAD")

    # Extract status code (last line)
    HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
    # Extract response body (everything except last line)
    RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)

    echo "HTTP Status: $HTTP_STATUS"
    echo "Response Body: $RESPONSE_BODY"

    if [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 200 ]; then
      echo "✅ Service created successfully!"
      echo ""
      echo "📌 IMPORTANT: All credentials are stored on Render, not in GitHub."
      echo "Next steps:"
      echo "1. Go to your Render dashboard."
      echo "2. Find your new service: vuln-scanner-${REPO_NAME}"
      echo "3. Go to Environment and add these variables:"
      echo "   - TELEGRAM_TOKEN"
      echo "   - GEMINI_API_KEY"
      echo "   - ALLOWED_CHAT_ID (optional)"
      echo "4. Save and your bot will restart automatically."
    else
      echo "❌ Deployment failed with HTTP status $HTTP_STATUS"
      echo "Response: $RESPONSE_BODY"
      exit 1
    fi
